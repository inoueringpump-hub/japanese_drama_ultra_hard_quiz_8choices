</aside>
</main>

let questions=[], idx=0, score=0, answered=false;
const $ = id => document.getElementById(id);

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function start(){
  questions = shuffle(rawQuestions).map(q=>{
    const opts = shuffle([q.a, ...q.o]);
    return {...q, opts};
  });
  idx=0; score=0; answered=false;
  $("total").textContent=questions.length;
  $("log").innerHTML="";
  render();
}
function rankText(){
  const r=score/questions.length;
  if(r===1) return "称号：局内で噂の化け物プロデューサー";
  if(r>=.85) return "称号：チーフ演出クラス";
  if(r>=.70) return "称号：現場を知りすぎた制作主任";
  if(r>=.50) return "称号：ポスプロで徹夜した人";
  if(r>=.30) return "称号：ドラマ好き上級者";
  if(r>=.15) return "称号：AD見習い";
  return "称号：番宣だけ見た人";
}
function render(){
  answered=false;
  const q=questions[idx];
  $("qno").textContent=`Q${idx+1}/${questions.length}`;
  $("genre").textContent=q.g;
  $("diff").textContent=q.d;
  $("question").textContent=q.q;
  $("score").textContent=score;
  $("bar").style.width=`${(score/questions.length)*100}%`;
  $("rank").textContent=rankText();
  $("explain").style.display="none";
  $("explain").innerHTML="";
  $("nextBtn").style.display = idx===questions.length-1 ? "none" : "inline-block";
  const box=$("options"); box.innerHTML="";
  q.opts.forEach((txt,n)=>{
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML=`<b>${String.fromCharCode(65+n)}.</b> ${txt}`;
    b.onclick=()=>answer(b,txt);
    box.appendChild(b);
  });
}
function answer(btn,txt){
  if(answered) return;
  answered=true;
  const q=questions[idx];
  const correct = txt===q.a;
  if(correct){score++; btn.classList.add("correct");}
  else{btn.classList.add("wrong");}
  [...document.querySelectorAll(".opt")].forEach(b=>{
    b.disabled=true;
    if(b.textContent.includes(q.a)) b.classList.add("correct");
  });
  $("score").textContent=score;
  $("bar").style.width=`${(score/questions.length)*100}%`;
  $("rank").textContent=rankText();
  $("explain").style.display="block";
  $("explain").innerHTML = `<b>${correct?"正解！":"不正解…"}</b><br>正解：${q.a}<br><br>${q.e}`;
  const log=document.createElement("div");
  log.innerHTML=`Q${idx+1}：${correct?"○":"×"} ${q.g}`;
  $("log").prepend(log);
  if(idx===questions.length-1){
    setTimeout(()=>finalResult(),250);
  }
}
function finalResult(){
  const pct=Math.round(score/questions.length*100);
  $("explain").style.display="block";
  $("explain").innerHTML += `<hr style="border-color:rgba(255,255,255,.12)"><b>最終結果：${score}/${questions.length}点（${pct}%）</b><br>${rankText()}<br><br>8択でこの難度なので、半分超えたら普通にかなり強いです。`;
}
$("nextBtn").onclick=()=>{ if(idx<questions.length-1){idx++;render();} };
$("restartBtn").onclick=start;
start();
</script>
